<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #e4cb63;
        }

        .envelope-container {
            position: relative;
            width: 200px;
            height: 150px;
            cursor: pointer;
        }

        .envelope {
            width: 100%;
            height: 100%;
            background-color: #eac612;
            position: relative;
            transform-style: preserve-3d;
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 50%;
            background-color: #eac612;
            top: 0;
            transform-origin: top;
            transition: transform 0.5s ease-in-out;
        }

        .envelope:hover .flap {
            transform: rotateX(-180deg); /* Flip only the flap */
        }

        .letter {
            position: absolute;
            width: 200%;
            height: 150%;
            top: 75%; /* Start letter below the envelope */
            left: -50%;
            background-color: #eac612;
            border: 2px solid #333;
            opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            z-index: -1;
            box-shadow: 0 0 10px 5px rgba(0, 0, 0, 0.2); /* Add shadow to create border effect */
        }

        .envelope:hover .letter {
            opacity: 1;
            z-index: 1;
            transform: translateY(-150px) scale(1.5); /* Move letter upwards */
        }

        .letter-content {
            transform: rotate(0deg); /* Keep text upright */
            font-size: 1.2rem;
            padding: 10px;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="envelope-container">
        <div class="envelope">
            <div class="flap"></div>
            <div class="letter">
                <div class="letter-content">
                    <h3><u>Save the date</u></h3>
                    <p style="color: red">&#127801;<b><i style="color:black">Imran w</i></b>&hearts;<b><i style="color: black">ds Maryam</i></b>&#127801;</p>
                    <p>&#128525;</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
